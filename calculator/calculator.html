<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <div class="calculator">
      <!-- Display -->
      <div id="display">----</div>

      <!-- Top row -->
      <div class="top-row">
        <button class="operation-button" id="multiply">*</button>
        <button class="operation-button" id="divide">/</button>
        <button class="operation-button" id="clear">C</button>
        <button class="operation-button" id="clear-entry">CE</button>
      </div>

      <!-- Number pad and side section -->
      <div class="mid-section">
        <!-- Number pad -->
        <div class="number-pad">
          <button class="numeric-button" id="1">1</button>
          <button class="numeric-button" id="2">2</button>
          <button class="numeric-button" id="3">3</button>
          <button class="numeric-button" id="4">4</button>
          <button class="numeric-button" id="5">5</button>
          <button class="numeric-button" id="6">6</button>
          <button class="numeric-button" id="7">7</button>
          <button class="numeric-button" id="8">8</button>
          <button class="numeric-button" id="9">9</button>
        </div>

        <!-- Side section -->
        <div class="side-section">
          <button class="operation-button" id="minus">-</button>
          <button class="operation-button" id="plus">+</button>
        </div>
      </div>

      <!-- Bottom-row -->
      <div class="bottom-row">
        <button class="numeric-button" id="0">0</button>
        <button class="numeric-button" id=".">.</button>
        <button class="operation-button" id="equals">=</button>
      </div>

    </div>
  </main>
  <script src="calculator.js" defer></script>
</body>

</html>
